<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UCFView · API Reference</title>
<script src="https://cdn.tailwindcss.com">
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js">
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/json.min.js">
</script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    /* ---- Light ---- */
    --bg-deep: #f4f6fb;
    --bg-side: #ffffff;
    --bg-card: #ffffff;
    --bg-elevated: #edf0f7;
    --bg-hover: rgba(99,102,241,0.06);
    --border: #e2e6ef;
    --border-accent: #c7d2fe;
    --text-main: #0b0f1a;
    --text-dim: #3f4659;
    --text-muted: #8b92a8;
    --accent: #4f46e5;
    --accent-glow: rgba(79,70,229,0.1);
    --accent-sub: #06b6d4;
    --accent-sub-glow: rgba(6,182,212,0.1);
    --green: #059669;
    --green-bg: rgba(5,150,105,0.08);
    --amber: #d97706;
    --amber-bg: rgba(217,119,6,0.08);
    --purple: #7c3aed;
    --purple-bg: rgba(124,58,237,0.08);
    --pink: #db2777;
    --pink-bg: rgba(219,39,119,0.08);
    --cyan: #0891b2;
    --cyan-bg: rgba(8,145,178,0.08);
    --rose: #e11d48;
    --rose-bg: rgba(225,29,72,0.08);
    --callout-warn-bg: #fffbeb;
    --callout-warn-border: #fde68a;
    --callout-info-bg: #eef2ff;
    --callout-info-border: #c7d2fe;
    --table-hdr: #edf0f7;
    --code-bg: #f8f9fb;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
    --sidebar-bg: rgba(255,255,255,0.92);
    --topbar-bg: rgba(244,246,251,0.88);
    --hljs-color: #1e293b;
    color-scheme: light;
  }
  :root.dark {
    --bg-deep: #080b16;
    --bg-side: #0c1021;
    --bg-card: #0f1428;
    --bg-elevated: #151b32;
    --bg-hover: rgba(99,102,241,0.08);
    --border: #1e2440;
    --border-accent: #2d3560;
    --text-main: #e8edf5;
    --text-dim: #9ca3bf;
    --text-muted: #5c6490;
    --accent: #818cf8;
    --accent-glow: rgba(129,140,248,0.12);
    --accent-sub: #22d3ee;
    --accent-sub-glow: rgba(34,211,238,0.1);
    --green: #34d399;
    --green-bg: rgba(52,211,153,0.1);
    --amber: #fbbf24;
    --amber-bg: rgba(251,191,36,0.1);
    --purple: #a78bfa;
    --purple-bg: rgba(167,139,250,0.1);
    --pink: #f472b6;
    --pink-bg: rgba(244,114,182,0.1);
    --cyan: #22d3ee;
    --cyan-bg: rgba(34,211,238,0.1);
    --rose: #fb7185;
    --rose-bg: rgba(251,113,133,0.1);
    --callout-warn-bg: rgba(217,119,6,0.1);
    --callout-warn-border: rgba(217,119,6,0.25);
    --callout-info-bg: rgba(99,102,241,0.1);
    --callout-info-border: rgba(99,102,241,0.2);
    --table-hdr: #151b32;
    --code-bg: #0d1124;
    --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.4);
    --sidebar-bg: rgba(12,16,33,0.94);
    --topbar-bg: rgba(8,11,22,0.9);
    --hljs-color: #e2e8f0;
    color-scheme: dark;
  }

  html { scroll-behavior: smooth; scroll-padding-top: 80px; }
  body {
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-main);
    display: flex;
    min-height: 100vh;
    transition: background .3s, color .3s;
  }

  /* Grid overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
  }
  :root.dark body::before {
    background-image:
      linear-gradient(rgba(129,140,248,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(129,140,248,0.04) 1px, transparent 1px);
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--text-muted); border-radius: 3px; }

  /* ===== SIDEBAR ===== */
  .sidebar {
    position: fixed; top: 0; left: 0; bottom: 0;
    width: 260px;
    background: var(--sidebar-bg);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column; z-index: 50;
    transition: transform .35s cubic-bezier(.4,0,.2,1), background .3s;
  }
  .sidebar-brand {
    padding: 22px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-brand .logo-row {
    display: flex; align-items: center; gap: 10px;
  }
  .sidebar-brand .logo-icon {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, var(--accent), var(--accent-sub));
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: #fff;
  }
  .sidebar-brand h1 {
    font-size: 18px; font-weight: 800;
    color: var(--text-main);
    letter-spacing: -.02em;
  }
  .sidebar-brand p {
    font-size: 11px; color: var(--text-muted);
    margin-top: 2px; letter-spacing: .04em;
    font-family: 'JetBrains Mono', monospace;
  }
  .sidebar-search {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    position: relative;
  }
  .sidebar-search input {
    width: 100%; padding: 9px 12px 9px 34px;
    background: var(--bg-elevated); border: 1px solid var(--border);
    border-radius: 8px; color: var(--text-main);
    font-size: 13px; font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color .2s, box-shadow .2s, background .3s;
  }
  .sidebar-search input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .sidebar-search input::placeholder { color: var(--text-muted); }
  .sidebar-search .s-icon {
    position: absolute; left: 27px; top: 50%;
    transform: translateY(-50%); color: var(--text-muted);
    pointer-events: none;
  }
  .sidebar-nav {
    flex: 1; overflow-y: auto; padding: 8px 0 20px;
  }
  .sidebar-nav::-webkit-scrollbar { width: 3px; }
  .nav-group {
    padding: 16px 16px 4px 20px;
    font-size: 9px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .12em; color: var(--text-muted);
  }
  .nav-item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 16px 6px 20px;
    margin: 0 8px; border-radius: 6px;
    font-size: 12px; font-weight: 500; color: var(--text-dim);
    cursor: pointer; transition: all .15s;
    text-decoration: none; position: relative;
  }
  .nav-item:hover { color: var(--text-main); background: var(--accent-glow); }
  .nav-item.active {
    color: var(--accent); background: var(--accent-glow);
  }
  .nav-item.active::before {
    content: '';
    position: absolute; left: -8px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; border-radius: 0 2px 2px 0;
    background: var(--accent);
  }
  .nav-item .nname { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ===== MAIN ===== */
  .main {
    margin-left: 260px; flex: 1; min-width: 0; position: relative; z-index: 1;
  }

  .topbar {
    position: sticky; top: 0; z-index: 40;
    background: var(--topbar-bg);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border-bottom: 1px solid var(--border);
    padding: 0 36px; height: 56px;
    display: flex; align-items: center; gap: 12px;
    transition: background .3s;
  }
  .topbar .mb-toggle {
    display: none; background: none; border: none;
    color: var(--text-dim); cursor: pointer; padding: 4px;
  }
  .topbar .crumbs {
    font-size: 12px; color: var(--text-muted);
    display: flex; align-items: center; gap: 8px;
    flex: 1;
  }
  .topbar .crumbs .sep { opacity: .4; }
  .topbar .crumbs .cur { color: var(--text-dim); }

  /* Theme toggle */
  .theme-toggle {
    background: var(--bg-elevated);
    border: 1px solid var(--border);
    border-radius: 8px;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s;
    color: var(--text-dim);
    flex-shrink: 0;
  }
  .theme-toggle:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .theme-toggle svg { transition: transform .4s; }
  .theme-toggle:hover svg { transform: rotate(15deg); }

  .content {
    max-width: 960px; padding: 0 36px 80px; margin: 0 auto;
  }

  /* ===== HERO ===== */
  .hero {
    padding: 44px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
    position: relative;
  }
  .hero::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent-sub), transparent);
    opacity: .5;
  }
  .hero .hero-badge {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
    background: var(--accent-glow);
    color: var(--accent);
    margin-bottom: 12px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: .02em;
  }
  .hero h1 {
    font-size: 34px; font-weight: 800;
    letter-spacing: -.03em; line-height: 1.15;
  }
  .hero h1 .gradient {
    background: linear-gradient(135deg, var(--accent), var(--accent-sub));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .hero p {
    font-size: 14px; color: var(--text-dim);
    line-height: 1.7; max-width: 620px; margin-top: 10px;
  }

  /* ===== STATS ROW ===== */
  .stats {
    display: grid; grid-template-columns: repeat(4,1fr);
    gap: 12px; margin-bottom: 36px;
  }
  .stat-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
    transition: border-color .2s, box-shadow .2s, background .3s;
    position: relative; overflow: hidden;
  }
  .stat-card:hover {
    border-color: var(--border-accent);
    box-shadow: var(--shadow-sm);
  }
  .stat-card .stat-bar {
    position: absolute; top: 0; left: 0; right: 0; height: 2px;
  }
  .stat-card .num {
    font-size: 24px; font-weight: 700; letter-spacing: -.02em;
  }
  .stat-card .lbl {
    font-size: 11px; color: var(--text-muted); margin-top: 2px;
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }

  /* ===== GROUP SECTION ===== */
  .group-section { margin-bottom: 36px; }
  .group-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .group-header .g-dot {
    width: 8px; height: 8px; border-radius: 50%;
    flex-shrink: 0;
  }
  .group-header h2 {
    font-size: 16px; font-weight: 700; color: var(--text-main);
    letter-spacing: -.01em;
  }
  .group-header .g-count {
    font-size: 11px; color: var(--text-muted);
    background: var(--bg-elevated); padding: 1px 9px;
    border-radius: 6px; font-family: 'JetBrains Mono', monospace;
  }

  /* ===== ENDPOINT CARD ===== */
  .ep-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 10px;
    overflow: hidden;
    transition: border-color .2s, box-shadow .2s, background .3s;
  }
  .ep-card:hover { border-color: var(--border-accent); }
  .ep-card.open {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent-glow), var(--shadow-md);
  }
  .ep-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 18px; cursor: pointer;
    user-select: none; transition: background .15s;
  }
  .ep-header:hover { background: var(--bg-hover); }
  .ep-tag {
    font-size: 9px; font-weight: 700; padding: 2px 7px;
    border-radius: 4px; letter-spacing: .04em;
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
  }
  .ep-tag.sync { background: var(--green-bg); color: var(--green); }
  .ep-tag.trigger { background: var(--amber-bg); color: var(--amber); }
  .ep-tag.system { background: var(--purple-bg); color: var(--purple); }
  .ep-name {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; font-weight: 600;
    color: var(--text-main); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .ep-arrow {
    color: var(--text-muted); flex-shrink: 0;
    transition: transform .3s;
  }
  .ep-card.open .ep-arrow { transform: rotate(180deg); }

  .ep-body { display: none; }
  .ep-card.open .ep-body { display: block; }

  .ep-inner { padding: 0 18px 18px; }
  .ep-inner > * + * { margin-top: 18px; }

  .ep-desc {
    font-size: 13px; line-height: 1.7; color: var(--text-dim);
  }

  /* Callout */
  .callout {
    border-radius: 8px; padding: 12px 14px;
    display: flex; gap: 10px; font-size: 12px; line-height: 1.6;
  }
  .callout svg { flex-shrink: 0; margin-top: 2px; }
  .callout.warn {
    background: var(--callout-warn-bg);
    border: 1px solid var(--callout-warn-border);
  }
  .callout.warn svg { color: var(--amber); }
  .callout.warn .c-title { color: var(--amber); font-weight: 600; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .callout.info {
    background: var(--callout-info-bg);
    border: 1px solid var(--callout-info-border);
  }
  .callout.info svg { color: var(--accent); }
  .callout.info .c-title { color: var(--accent); font-weight: 600; margin-bottom: 3px; font-size: 11px; text-transform: uppercase; letter-spacing: .05em; }
  .callout ul { list-style: none; }
  .callout ul li {
    position: relative; padding-left: 14px;
    color: var(--text-dim);
  }
  .callout ul li::before {
    content: ""; position: absolute; left: 0; top: 7px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--text-muted);
  }

  .sect-title {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: .07em; color: var(--text-muted);
    display: flex; align-items: center; gap: 6px;
    padding-bottom: 6px; border-bottom: 1px solid var(--border);
  }

  /* Params table */
  .p-wrap {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .p-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px; min-width: 480px;
  }
  .p-table th {
    text-align: left; padding: 7px 12px;
    font-weight: 600; color: var(--text-muted);
    font-size: 10px; text-transform: uppercase; letter-spacing: .06em;
    background: var(--table-hdr);
    border-bottom: 1px solid var(--border);
  }
  .p-table td {
    padding: 6px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim); vertical-align: top;
  }
  .p-table tr:last-child td { border-bottom: none; }
  .p-table .pn {
    font-family: 'JetBrains Mono', monospace; font-size: 11px;
    color: var(--text-main); white-space: nowrap;
  }
  .p-table .pn .nested { color: var(--text-muted); }
  .p-table .pt {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text-muted);
    white-space: nowrap;
  }
  .p-table .pr { font-size: 10px; white-space: nowrap; }
  .p-table .pr.y { color: var(--green); }
  .p-table .pr.n { color: var(--text-muted); }
  .p-table .pd { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .p-table .pd code {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    background: var(--accent-glow); color: var(--accent);
    padding: 1px 5px; border-radius: 3px;
  }

  /* Code blocks */
  .cb {
    border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    transition: border-color .2s;
  }
  .cb-h {
    display: flex; align-items: center; justify-content: space-between;
    padding: 5px 12px; background: var(--table-hdr);
    border-bottom: 1px solid var(--border);
    font-size: 10px; color: var(--text-muted);
  }
  .cb-h .cbl { display: flex; align-items: center; gap: 5px; }
  .cb-h .cbl .dot { width: 7px; height: 7px; border-radius: 50%; transition: opacity .2s; }
  .cb-h .cbl .dot.r { background: #ef4444; }
  .cb-h .cbl .dot.y { background: #eab308; }
  .cb-h .cbl .dot.g { background: #22c55e; }
  .cb-h .cpy {
    display: flex; align-items: center; gap: 4px;
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 10px; font-family: 'Inter', sans-serif;
    padding: 2px 7px; border-radius: 4px; transition: all .15s;
  }
  .cb-h .cpy:hover { background: var(--bg-hover); color: var(--text-dim); }
  .cb-h .cpy.done { color: var(--green); }
  .cb pre {
    margin: 0; padding: 12px; background: var(--code-bg);
    overflow-x: auto; font-size: 12px; line-height: 1.6;
    transition: background .3s;
  }
  .cb pre code {
    font-family: 'JetBrains Mono', monospace; background: none !important; padding: 0 !important;
  }
  .hljs { background: transparent !important; }
  .hljs { color: var(--hljs-color) !important; }
  :root.dark .hljs { color: #e2e8f0 !important; }
  :root.dark .hljs-keyword,
  :root.dark .hljs-selector-tag,
  :root.dark .hljs-type { color: #a78bfa !important; }
  :root.dark .hljs-string,
  :root.dark .hljs-attr { color: #6ee7b7 !important; }
  :root.dark .hljs-number,
  :root.dark .hljs-literal { color: #67e8f9 !important; }
  :root.dark .hljs-comment,
  :root.dark .hljs-quote { color: #64748b !important; }
  :root.dark .hljs-built_in,
  :root.dark .hljs-title { color: #818cf8 !important; }
  :root.dark .hljs-property { color: #7dd3fc !important; }
  :root.dark .hljs-attribute { color: #fcd34d !important; }
  :root.dark .hljs-punctuation { color: #94a3b8 !important; }

  /* Mobile */
  .sidebar-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.35); z-index: 45;
    backdrop-filter: blur(4px);
  }

  @media (max-width: 768px) {
    .sidebar { transform: translateX(-100%); }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .main { margin-left: 0; }
    .topbar { padding: 0 14px; }
    .topbar .mb-toggle { display: block; }
    .topbar .crumbs { font-size: 11px; }
    .content { padding: 0 14px 60px; }
    .hero { padding: 28px 0 24px; }
    .hero h1 { font-size: 24px; }
    .stats { grid-template-columns: repeat(2,1fr); }
    .ep-header { padding: 10px 12px; }
    .ep-inner { padding: 0 12px 12px; }
    .ep-name { font-size: 11px; }
  }
  @media (max-width: 480px) {
    .stats { grid-template-columns: repeat(2,1fr); gap: 8px; }
    .stat-card { padding: 10px 12px; }
    .stat-card .num { font-size: 18px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    html { scroll-behavior: auto; }
  }
</style>
</head>
<body>

<div class="sidebar-overlay" id="ov" onclick="toggleSidebar()"></div>

<aside class="sidebar" id="sidebar">
  <div class="sidebar-brand">
    <div class="logo-row">
      <div class="logo-icon">U</div>
      <h1>UCFView</h1>
    </div>
    <p>// API Reference v1.0</p>
  </div>
  <div class="sidebar-search">
    <svg class="s-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>

// ===================== RENDER =====================
const TL = {sync:"同步接口",trigger:"触发接口",system:"系统接口"};
const TC = {sync:"sync",trigger:"trigger",system:"system"};
const TDOT = {sync:"#34d399",trigger:"#fbbf24",system:"#a78bfa"};

function renderAll() {
  const flat = Object.keys(API);

  // Stats
  const total = flat.length;
  const syncN = flat.filter(n=>API[n].t==="sync").length;
  const trigN = flat.filter(n=>API[n].t==="trigger").length;
  const sysN = flat.filter(n=>API[n].t==="system").length;
  document.getElementById("statsRow").innerHTML = `
    <div class="stat-card">
      <div class="stat-bar" style="background:linear-gradient(90deg,var(--accent),var(--accent-sub))"></div>
      <div class="num" style="color:var(--accent)">${total}</div>
      <div class="lbl">接口总数</div>
    </div>
    <div class="stat-card">
      <div class="stat-bar" style="background:var(--green)"></div>
      <div class="num" style="color:var(--green)">${syncN}</div>
      <div class="lbl">同步接口</div>
    </div>
    <div class="stat-card">
      <div class="stat-bar" style="background:var(--amber)"></div>
      <div class="num" style="color:var(--amber)">${trigN}</div>
      <div class="lbl">触发接口</div>
    </div>
    <div class="stat-card">
      <div class="stat-bar" style="background:var(--purple)"></div>
      <div class="num" style="color:var(--purple)">${sysN}</div>
      <div class="lbl">系统接口</div>
    </div>
  `;

  // Sidebar nav
  let sn = "";
  GRP.forEach(g => {
    sn += `<div class="nav-group">${g.label}</div>`;
    g.apis.forEach(n => {
      const d = API[n];
      sn += `<a class="nav-item" href="#${n}" onclick="return navClick(this,'${n}')">
        <span class="nname">${n.replace("UCFView/","")}</span>
      </a>`;
    });
  });
  document.getElementById("snav").innerHTML = sn;

  // Groups + endpoints
  let html = "";
  GRP.forEach(g => {
    html += `<section class="group-section" id="g-${g.id}">`;
    html += `<div class="group-header">
      <div class="g-dot" style="background:${g.dot}"></div>
      <h2>${g.label}</h2>
      <span class="g-count">${g.apis.length}</span>
    </div>`;
    g.apis.forEach(n => {
      const d = API[n];
      html += epCard(n, d);
    });
    html += `</section>`;
  });
  document.getElementById("groupsContainer").innerHTML = html;

  // Re-highlight
  document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
}

function epCard(name, d) {
  let h = `<div class="ep-card" data-api="${name}" id="${name}">`;
  h += `<div class="ep-header" onclick="toggleEP(this)">
    <span class="ep-tag ${TC[d.t]}">${TL[d.t] === "同步接口" ? "SYNC" : TL[d.t] === "触发接口" ? "EVENT" : "SYS"}</span>
    <span class="ep-name">${name}</span>
    <svg class="ep-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
  </div>`;
  h += `<div class="ep-body"><div class="ep-inner">`;

  // Description
  h += `<p class="ep-desc">${d.desc}</p>`;

  // Notes
  if (d.notes) {
    h += `<div class="callout warn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></svg>
      <div><div class="c-title">注意事项</div><ul>${d.notes.map(n=>`<li>${n}</li>`).join("")}</ul></div>
    </div>`;
  }

  // Scenario
  if (d.scenario) {
    h += `<div class="callout info">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div><div class="c-title">使用场景</div><ul>${d.scenario.map(s=>`<li>${s}</li>`).join("")}</ul></div>
    </div>`;
  }

  // Request params
  if (!d.noReq && d.pf) {
    h += `<div class="sect-title">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg>
      请求参数
    </div>`;
    if (d.pf.length) {
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead><tbody>`;
      d.pf.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pd">${p[2]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
    if (d.pi.length) {
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
      d.pi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
    if (d.kpi) {
      h += `<div style="margin:6px 0 2px;font-size:11px;color:var(--text-muted)">Keyframes 数组元素：</div>`;
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
      d.kpi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
  }

  // Request examples
  if (d.re) {
    d.re.forEach(ex => {
      h += `<div class="sect-title" style="margin-top:14px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg> ${ex.lb}</div>`;
      h += codeBlock(ex.cd);
    });
  } else if (!d.noReq && d.req) {
    h += `<div class="sect-title" style="margin-top:14px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg> 请求示例</div>`;
    h += codeBlock(d.req);
    if (d.reqNote) h += `<div style="font-size:12px;color:var(--text-muted);line-height:1.7">${d.reqNote}</div>`;
  }

  // Callback
  h += `<div class="sect-title" style="margin-top:18px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 响应参数</div>`;
  const cbf = d.cf || [["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Status","Boolean","操作是否成功"],["DebugInfo","String","调试信息"],["Params","Object","参数对象"]];
  h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead><tbody>`;
  cbf.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pd">${p[2]}</td></tr>`);
  h += `</tbody></table></div>`;
  if (d.cbi) {
    h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
    d.cbi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
    h += `</tbody></table></div>`;
  }
  if (d.ce) {
    d.ce.forEach(ex => {
      h += `<div class="sect-title" style="margin-top:10px">${ex.lb}</div>`;
      h += codeBlock(ex.cd);
    });
  } else if (d.cb) {
    h += `<div class="sect-title" style="margin-top:10px">响应示例</div>`;
    h += codeBlock(d.cb);
  }

  h += `</div></div></div>`;
  return h;
}

function codeBlock(code) {
  const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="cb">
    <div class="cb-h">
      <div class="cbl"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
      <button class="cpy" onclick="cpy(this)" data-cd="${encodeURIComponent(code)}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制
      </button>
    </div>
    <pre><code class="language-json">${esc}</code></pre>
  </div>`;
}

// ===================== INTERACTIONS =====================
function toggleEP(h, fromNav) {
  const card = h.closest ? h.closest('.ep-card') : h;
  card.classList.toggle('open');
  if (!fromNav) syncNav(card.dataset.api);
}

function navClick(el, name) {
  const card = document.getElementById(name);
  if (card) {
    card.classList.add('open');
    setTimeout(() => {
      card.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 50);
  }
  syncNav(name);
  closeMb();
  return false;
}

function syncNav(name) {
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.getAttribute('href') === '#' + name);
  });
}

function cpy(btn) {
  const code = decodeURIComponent(btn.dataset.cd);
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('done');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
    }, 2000);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('ov').classList.toggle('open');
}

function closeMb() {
  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('ov').classList.remove('open');
  }
}

// Search
function doFilter(q) {
  const s = q.toLowerCase().trim();
  document.querySelectorAll('.ep-card').forEach(c => {
    const m = !s || c.dataset.api.toLowerCase().includes(s) || c.textContent.toLowerCase().includes(s);
    c.style.display = m ? '' : 'none';
  });
  document.querySelectorAll('.nav-item').forEach(n => {
    n.style.display = (!s || n.textContent.toLowerCase().includes(s)) ? '' : 'none';
  });
  document.querySelectorAll('.group-section').forEach(gs => {
    const vis = [...gs.querySelectorAll('.ep-card')].some(e => e.style.display !== 'none');
    gs.style.display = vis ? '' : 'none';
  });
}

// Active nav highlight on scroll (IntersectionObserver)
const obs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      syncNav(entry.target.dataset.api);
    }
  });
}, { rootMargin: '-80px 0px -60% 0px' });

renderAll();
document.querySelectorAll('.ep-card').forEach(c => obs.observe(c));
</script>
</body>
