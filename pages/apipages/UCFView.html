<style>
/* ── API Doc Layout ── */
:root{--api-sidebar-w:270px}

.api-layout{display:flex;max-width:var(--max-w);margin:0 auto;padding:0 24px 60px;gap:28px;position:relative}

/* ── Sidebar ── */
.api-sidebar{
  width:var(--api-sidebar-w);flex-shrink:0;
  position:sticky;top:calc(var(--nav-h) + 24px);height:calc(100vh - var(--nav-h) - 48px);
  display:flex;flex-direction:column;overflow:hidden;z-index:10;
  border-radius:var(--radius-md);
  background:var(--bg-card);border:1px solid var(--border-glass);
  backdrop-filter:blur(12px);
}
.api-sidebar-brand{
  padding:16px 16px 12px;border-bottom:1px solid var(--border-glass);flex-shrink:0;
  display:flex;flex-direction:column;gap:2px;
}
.api-sidebar-brand h2{
  font-family:'Orbitron',sans-serif;font-size:15px;font-weight:700;color:var(--text-main);
  display:flex;align-items:center;gap:8px;
}
.api-sidebar-brand h2 .badge{
  font-size:9px;font-weight:600;padding:1px 7px;border-radius:4px;
  background:var(--green-glow);color:var(--green);font-family:'Exo 2',sans-serif;
}
.api-sidebar-brand p{font-size:12px;color:var(--text-dim);font-family:'Exo 2',monospace}
.api-sidebar-search{
  padding:10px 12px;flex-shrink:0;position:relative;
}
.api-sidebar-search input{
  width:100%;padding:7px 10px 7px 30px;
  background:var(--bg-glass);border:1px solid var(--border-glass);
  border-radius:var(--radius-sm);color:var(--text-main);
  font-size:14px;font-family:'Exo 2',sans-serif;
  outline:none;transition:border-color .2s,box-shadow .2s;
}
.api-sidebar-search input:focus{border-color:rgba(74,222,128,0.3);box-shadow:0 0 0 3px var(--green-glow)}
.api-sidebar-search input::placeholder{color:var(--text-dim)}
.api-sidebar-search .s-icon{position:absolute;left:22px;top:50%;transform:translateY(-50%);color:var(--text-dim);pointer-events:none}
.api-sidebar-nav{flex:1;overflow-y:auto;padding:6px 0 12px}
.api-sidebar-nav::-webkit-scrollbar{width:3px}
.snav-group{
  padding:14px 16px 4px 18px;
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--text-dim);
}
.snav-item{
  display:flex;align-items:center;gap:6px;
  padding:7px 12px 7px 18px;margin:1px 6px;border-radius:5px;
  font-size:14px;font-weight:500;color:var(--text-muted);
  cursor:pointer;transition:all .15s;text-decoration:none;position:relative;
}
.snav-item:hover{color:var(--text-main);background:var(--green-glow)}
.snav-item.active{color:var(--green);background:var(--green-glow)}
.snav-item.active::before{
  content:'';position:absolute;left:-6px;top:50%;transform:translateY(-50%);
  width:3px;height:55%;border-radius:0 2px 2px 0;background:var(--green);
}
.snav-item .sname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── Content ── */
.api-content{flex:1;min-width:0}
.api-content > * + *{margin-top:32px}

/* ── Group Sections ── */
.api-group{margin-bottom:32px}
.api-group-header{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;padding-bottom:8px;
  border-bottom:1px solid var(--border-glass);
}
.api-group-header .g-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.api-group-header h2{font-size:18px;font-weight:700;color:var(--text-main);letter-spacing:-.01em}
.api-group-header .g-count{
  font-size:13px;color:var(--text-dim);margin-left:auto;
  background:var(--bg-glass);padding:2px 10px;border-radius:5px;font-family:'Exo 2',monospace;
}

/* ── Endpoint Cards ── */
.ep-card{
  background:var(--bg-card);border:1px solid var(--border-glass);
  border-radius:var(--radius-md);margin-bottom:8px;overflow:hidden;
  transition:border-color .2s,box-shadow .2s;
}
.ep-card.open{
  border-color:rgba(74,222,128,0.2);
  box-shadow:0 0 0 1px var(--green-glow),0 8px 32px rgba(0,0,0,0.25);
}
.ep-header{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;user-select:none;transition:background .15s;
}
.ep-header:hover{background:var(--bg-glass)}
.ep-name{
  font-size:14px;font-weight:500;
  color:var(--text-main);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.ep-arrow{color:var(--text-dim);flex-shrink:0;transition:transform .3s}
.ep-card.open .ep-arrow{transform:rotate(180deg)}
.ep-body{display:none}
.ep-card.open .ep-body{display:block}
.ep-inner{padding:0 16px 16px}
.ep-inner > * + *{margin-top:16px}
.ep-desc{font-size:15px;line-height:1.7;color:var(--text-muted)}

/* Callouts */
.callout{
  border-radius:var(--radius-sm);padding:12px 16px;
  display:flex;gap:10px;font-size:14px;line-height:1.7;
}
.callout svg{flex-shrink:0;margin-top:2px}
.callout.warn{background:rgba(251,191,36,0.06);border:1px solid rgba(251,191,36,0.15)}
.callout.warn svg{color:#fbbf24}
.callout.warn .c-title{color:#fbbf24;font-weight:600;margin-bottom:3px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.callout.info{background:var(--indigo-glow);border:1px solid rgba(99,102,241,0.15)}
.callout.info svg{color:var(--indigo)}
.callout.info .c-title{color:var(--indigo);font-weight:600;margin-bottom:3px;font-size:12px;text-transform:uppercase;letter-spacing:.05em}
.callout ul{list-style:none}
.callout ul li{position:relative;padding-left:14px;color:var(--text-muted)}
.callout ul li::before{content:'';position:absolute;left:0;top:7px;width:4px;height:4px;border-radius:50%;background:var(--text-dim)}

/* Section title */
.api-stitle{
  font-size:12px;font-weight:700;text-transform:uppercase;
  letter-spacing:.07em;color:var(--text-dim);
  display:flex;align-items:center;gap:6px;padding-bottom:6px;border-bottom:1px solid var(--border-glass);
}

/* Params table */
.p-wrap{overflow-x:auto;border:1px solid var(--border-glass);border-radius:var(--radius-sm)}
.p-table{width:100%;border-collapse:collapse;font-size:14px;min-width:480px}
.p-table th{
  text-align:left;padding:8px 12px;
  font-weight:600;color:var(--text-dim);
  font-size:12px;text-transform:uppercase;letter-spacing:.06em;
  background:var(--bg-glass);border-bottom:1px solid var(--border-glass);
}
.p-table td{padding:7px 12px;border-bottom:1px solid var(--border-glass);color:var(--text-muted);vertical-align:top}
.p-table tr:last-child td{border-bottom:none}
.p-table .pn{font-family:'Exo 2',monospace;font-size:13px;color:var(--text-main);white-space:nowrap}
.p-table .pn .nested{color:var(--text-dim)}
.p-table .pt{font-family:'Exo 2',monospace;font-size:12px;color:var(--text-dim);white-space:nowrap}
.p-table .pr{font-size:12px;white-space:nowrap}
.p-table .pr.y{color:var(--green)}
.p-table .pr.n{color:var(--text-dim)}
.p-table .pd{font-size:13px;color:var(--text-muted);line-height:1.5}
.p-table .pd code{font-family:'Exo 2',monospace;font-size:12px;background:var(--green-glow);color:var(--green);padding:1px 5px;border-radius:3px}
.api-stitle + .p-wrap{margin-top:-4px}

/* Code blocks */
.cb{border:1px solid var(--border-glass);border-radius:var(--radius-sm);overflow:hidden;transition:border-color .2s}
.cb-h{
  display:flex;align-items:center;justify-content:space-between;
  padding:5px 12px;background:rgba(0,0,0,0.2);
  border-bottom:1px solid var(--border-glass);
  font-size:10px;color:var(--text-dim);
}
.cb-h .cbl{display:flex;align-items:center;gap:5px}
.cb-h .cbl .dot{width:7px;height:7px;border-radius:50%}
.cb-h .cbl .dot.r{background:#ef4444}
.cb-h .cbl .dot.y{background:#eab308}
.cb-h .cbl .dot.g{background:#22c55e}
.cb-h .cpy{
  display:flex;align-items:center;gap:4px;
  background:none;border:none;color:var(--text-dim);
  cursor:pointer;font-size:12px;font-family:'Exo 2',sans-serif;
  padding:3px 8px;border-radius:4px;transition:all .15s;
}
.cb-h .cpy:hover{background:var(--bg-glass);color:var(--text-muted)}
.cb-h .cpy.done{color:var(--green)}
.cb pre{margin:0;padding:14px;background:rgba(0,0,0,0.3);overflow-x:auto;font-size:13px;line-height:1.7}
.cb pre code{font-family:'Exo 2',monospace;background:none!important;padding:0!important}
.hljs{background:transparent!important}
.hljs{color:#e2e8f0!important}
.hljs-keyword,.hljs-selector-tag,.hljs-type{color:#a78bfa!important}
.hljs-string,.hljs-attr{color:#6ee7b7!important}
.hljs-number,.hljs-literal{color:#67e8f9!important}
.hljs-comment,.hljs-quote{color:#64748b!important}
.hljs-built_in,.hljs-title{color:#818cf8!important}
.hljs-property{color:#7dd3fc!important}
.hljs-attribute{color:#fcd34d!important}
.hljs-punctuation{color:#94a3b8!important}

/* Note inline */
.api-note{font-size:14px;color:var(--text-dim);line-height:1.7}

/* ── Mobile ── */
.api-sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:45;backdrop-filter:blur(4px)}

@media(max-width:1024px){
  .api-layout{flex-direction:column;padding:0 16px 60px}
  .api-layout::before{display:none}
  .api-sidebar{
    width:100%;position:relative;top:auto;height:auto;max-height:none;
    border-radius:var(--radius-md);margin-bottom:0;
  }
  .api-sidebar-nav{max-height:260px}
}
@media(max-width:600px){
  .ep-header{padding:8px 12px}
  .ep-inner{padding:0 12px 12px}
  .ep-name{font-size:13px}
  .p-wrap{overflow-x:auto}
  .p-table{min-width:480px}
  .api-layout{padding:0 12px 60px}
}
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}
  html{scroll-behavior:auto}
}
</style>
</head>

<script>
document.getElementById('year').textContent=new Date().getFullYear();

// ===================== DATA =====================
const GRP = [
  { id:"pos", label:"位置与视角", dot:"#34d399",
    apis:["UCFView/SetDPPosition","UCFView/SetDPLocation","UCFView/SetDPRotation","UCFView/GetDPPosition","UCFView/FocusToActorByTag"] },
  { id:"roam", label:"漫游控制", dot:"#60a5fa",
    apis:["UCFView/StartRoamUniformTime","UCFView/StartRoamUniformSpeed","UCFView/StartRoamCustomTime","UCFView/PauseRoam","UCFView/ResumeRoam","UCFView/StopRoam","UCFView/RestartRoam","UCFView/OnRoamFinished"] },
  { id:"input", label:"输入配置", dot:"#fbbf24",
    apis:["UCFView/ModifyDPInputConfig","UCFView/ResetDPInputToDefault"] },
  { id:"feature", label:"功能控制", dot:"#a78bfa",
    apis:["UCFView/SetDPFeatureSwitch","UCFView/SetDPSpeedParams"] },
  { id:"sys", label:"系统", dot:"#f472b6",
    apis:["UCFView/Reset"] }
];

const API = {
  "UCFView/SetDPPosition": {
    t:"sync", title:"设置 DefaultPawn 的位置和视角", desc:"设置 DefaultPawn 的位置和视角，支持相对目标位置的反向偏移和平滑移动效果。",
    notes:["当前 Player0 必须是 DefaultPawn 类型，否则操作失败","OffestDistance 为相对目标位置的反向偏移距离，单位为厘米","bIgnoreLag 为 false 时会启用平滑移动效果"],
    pf:[["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Params","Object","参数对象"]],
    pi:[["DesirLocation","Object","必填","目标位置，世界坐标系下的三维坐标"],["DesirLocation.X","Float","必填","X坐标，单位：厘米"],["DesirLocation.Y","Float","必填","Y坐标，单位：厘米"],["DesirLocation.Z","Float","必填","Z坐标，单位：厘米"],["DesirRotation","Object","必填","目标视角，欧拉角表示的旋转值"],["DesirRotation.Pitch","Float","必填","俯仰角，单位：度，取值 [-90,90]"],["DesirRotation.Yaw","Float","必填","偏航角，单位：度，取值 [-180,180]"],["DesirRotation.Roll","Float","必填","翻滚角，单位：度，取值 [-180,180]"],["OffestDistance","Float","选填","相对目标位置的反向偏移距离（厘米），默认 <code>0</code>"],["bIgnoreLag","Boolean","选填","是否忽略平滑移动效果，默认 <code>false</code>"]],
    req:'{\n  "ExecutionID": "123456789",\n  "Interface": "UCFView/SetDPPosition",\n  "Params": {\n    "DesirLocation": { "X": 1000.0, "Y": 2000.0, "Z": 500.0 },\n    "DesirRotation": { "Pitch": 0.0, "Yaw": 90.0, "Roll": 0.0 },\n    "OffestDistance": 100.0,\n    "bIgnoreLag": false\n  }\n}',
    cb:'{\n  "ExecutionID": "123456789",\n  "Interface": "UCFView/SetDPPosition",\n  "Status": true,\n  "DebugInfo": "成功",\n  "Params": {}\n}'
  },
  "UCFView/SetDPLocation": {
    t:"sync", title:"设置 DefaultPawn 的位置", desc:"设置 DefaultPawn 的位置，保持当前视角不变，支持反向偏移和平滑移动。",
    notes:["当前 Player0 必须是 DefaultPawn 类型，否则操作失败","该接口仅修改位置，不改变当前视角","OffestDistance 为相对目标位置的反向偏移距离，单位为厘米","bIgnoreLag 为 false 时会启用平滑移动效果"],
    pf:[["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Params","Object","参数对象"]],

    pi:[["bEnableCollision","Boolean","选填","碰撞开关"],["bEnableHMove","Boolean","选填","固定锚点水平移动"],["bEnableVMove","Boolean","选填","竖直移动"],["bEnableRotateWithAnchor","Boolean","选填","固定锚点旋转"],["bEnableRotateWithSelf","Boolean","选填","绕自身旋转"],["bEnableZoom","Boolean","选填","缩放"],["bEnableFastFocus","Boolean","选填","快速聚焦"]],
    re:[{lb:"仅禁用碰撞",cd:'{\n  "ExecutionID": "1823456789",\n  "Interface": "UCFView/SetDPFeatureSwitch",\n  "Params": { "bEnableCollision": false }\n}'},{lb:"禁用移动和旋转",cd:'{\n  "ExecutionID": "1823456789",\n  "Interface": "UCFView/SetDPFeatureSwitch",\n  "Params": {\n    "bEnableHMove": false,\n    "bEnableVMove": false,\n    "bEnableRotateWithAnchor": false,\n    "bEnableRotateWithSelf": false\n  }\n}'},{lb:"启用所有功能",cd:'{\n  "ExecutionID": "1823456789",\n  "Interface": "UCFView/SetDPFeatureSwitch",\n  "Params": {\n    "bEnableCollision": true,\n    "bEnableHMove": true,\n    "bEnableVMove": true,\n    "bEnableRotateWithAnchor": true,\n    "bEnableRotateWithSelf": true,\n    "bEnableZoom": true,\n    "bEnableFastFocus": true\n  }\n}'}],
    cb:'{\n  "ExecutionID": "1823456789",\n  "Interface": "UCFView/SetDPFeatureSwitch",\n  "Status": true,\n  "DebugInfo": "成功",\n  "Params": {}\n}'
  },
  "UCFView/SetDPSpeedParams": {
    t:"sync", title:"设置DefaultPawn速度参数", desc:"设置 DefaultPawn 各项操作的速度参数。所有参数均为选填，不传入则保持当前值不变。",
    notes:["当前 Player0 必须是 DefaultPawn 类型，否则操作失败","所有参数均为可选，不传入则保持当前值不变","ZoomPercent 限制在 [0.1, 0.8] 范围内","LagSpeed 限制在 [0.0, 8.0] 范围内，0 表示关闭平滑效果","修改后立即生效"],
    scenario:["根据场景需求调整操作速度","为不同用户提供个性化操作体验","动态调整平滑效果强度"],
    pf:[["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Params","Object","参数对象"]],
    pi:[["RotateSpeed","Float","选填","旋转角速度，默认 <code>3.0</code>"],["VerticalMoveSpeed","Float","选填","竖直移动速度（米/秒），默认 <code>3.0</code>"],["ZoomPercent","Float","选填","缩放百分比，取值 [0.1, 0.8]，默认 <code>0.4</code>"],["LagSpeed","Float","选填","滞后平滑速度，取值 [0.0, 8.0]，默认 <code>5.0</code>"]],
    re:[{lb:"仅修改旋转速度",cd:'{\n  "ExecutionID": "1323456789",\n  "Interface": "UCFView/SetDPSpeedParams",\n  "Params": { "RotateSpeed": 5.0 }\n}'},{lb:"修改多个参数",cd:'{\n  "ExecutionID": "1323456789",\n  "Interface": "UCFView/SetDPSpeedParams",\n  "Params": { "RotateSpeed": 4.0, "VerticalMoveSpeed": 5.0, "ZoomPercent": 0.5, "LagSpeed": 6.0 }\n}'},{lb:"关闭平滑效果",cd:'{\n  "ExecutionID": "1323456789",\n  "Interface": "UCFView/SetDPSpeedParams",\n  "Params": { "LagSpeed": 0.0 }\n}'}],
    cb:'{\n  "ExecutionID": "1323456789",\n  "Interface": "UCFView/SetDPSpeedParams",\n  "Status": true,\n  "DebugInfo": "成功",\n  "Params": {}\n}'

  "UCFView/OnRoamFinished": {
    t:"trigger", title:"漫游结束通知", desc:"漫游自动结束时触发的回调接口。当漫游正常完成（非手动停止）时由系统自动触发。",
    notes:["触发接口，由系统自动调用，无需手动调用","仅在漫游自然完成时触发，手动 StopRoam 不会触发","适用于所有三种漫游模式","可用于在漫游结束后执行后续操作"],
    noReq:true,
    cf:[["ExecutionID","String","执行ID（系统自动生成）"],["Interface","String","固定为 UCFView/OnRoamFinished"],["Status","Boolean","固定为 true"],["DebugInfo","String","固定为「漫游已完成」"],["Params","Object","参数对象"]],
    cb:'{\n  "ExecutionID": "auto_generated_id",\n  "Interface": "UCFView/OnRoamFinished",\n  "Status": true,\n  "DebugInfo": "漫游已完成",\n  "Params": {}\n}'

    t:"system", title:"重置UCFView类的所有状态", desc:"重置 UCFView 接口类的所有状态，清除内存占用和缓存数据。",
    notes:["系统自动生成的接口","清除 UCFView 接口类的所有状态和缓存","操作不可逆，重置后需重新调用相关接口","仅重置 UCFView 接口类，不影响其他接口类"],
    pf:[["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Params","Object","参数对象"]],pi:[],
    req:'{\n  "ExecutionID": "测试ID",\n  "Interface": "UCFView/Reset",\n  "Params": {}\n}',

// ===================== RENDER =====================

function renderAll() {
  const flat = Object.keys(API);
  const total = flat.length;

  let sn = "";
  GRP.forEach(g => {
    sn += `<div class="snav-group">${g.label}</div>`;
    g.apis.forEach(n => {
      sn += `<a class="snav-item" href="#${n}" onclick="return navClick(this,'${n}')">
        <span class="sname">${n}</span>
      </a>`;
    });
  });
  document.getElementById("snav").innerHTML = sn;

  let html = "";
  GRP.forEach(g => {
    html += `<section class="api-group" id="g-${g.id}">`;
    html += `<div class="api-group-header">
      <div class="g-dot" style="background:${g.dot}"></div>
      <h2>${g.label}</h2>
      <span class="g-count">${g.apis.length}</span>
    </div>`;
    g.apis.forEach(n => { html += epCard(n, API[n]); });
    html += `</section>`;
  });
  document.getElementById("groupsContainer").innerHTML = html;

  document.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
}

function epCard(name, d) {
  let h = `<div class="ep-card" data-api="${name}" id="${name}">`;
  h += `<div class="ep-header" onclick="toggleEP(this)">
    <span class="ep-name">${d.title || d.desc}</span>
    <svg class="ep-arrow" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="m6 9 6 6 6-6"/></svg>
  </div>`;
  h += `<div class="ep-body"><div class="ep-inner">`;

  h += `<p class="ep-desc">${d.desc}</p>`;

  if (d.notes) {
    h += `<div class="callout warn">
      <div><div class="c-title">注意事项</div><ul>${d.notes.map(n=>`<li>${n}</li>`).join("")}</ul></div>
    </div>`;
  }

  if (d.scenario) {
    h += `<div class="callout info">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
      <div><div class="c-title">使用场景</div><ul>${d.scenario.map(s=>`<li>${s}</li>`).join("")}</ul></div>
    </div>`;
  }

  if (!d.noReq && d.pf) {
    h += `<div class="api-stitle"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg> 请求参数</div>`;
    if (d.pf.length) {
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead><tbody>`;
      d.pf.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pd">${p[2]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
    if (d.pi.length) {
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
      d.pi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
    if (d.kpi) {
      h += `<div style="margin:6px 0 2px;font-size:11px;color:var(--text-dim)">Keyframes 数组元素：</div>`;
      h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
      d.kpi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
      h += `</tbody></table></div>`;
    }
  }

  if (d.re) {
    d.re.forEach(ex => {
      h += `<div class="api-stitle" style="margin-top:14px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg> ${ex.lb}</div>`;
      h += codeBlock(ex.cd);
    });
  } else if (!d.noReq && d.req) {
    h += `<div class="api-stitle" style="margin-top:14px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/></svg> 请求示例</div>`;
    h += codeBlock(d.req);
    if (d.reqNote) h += `<div class="api-note">${d.reqNote}</div>`;
  }

  h += `<div class="api-stitle" style="margin-top:18px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 响应参数</div>`;
  const cbf = d.cf || [["ExecutionID","String","执行ID"],["Interface","String","接口名称"],["Status","Boolean","操作是否成功"],["DebugInfo","String","调试信息"],["Params","Object","参数对象"]];
  h += `<div class="p-wrap"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th>说明</th></tr></thead><tbody>`;
  cbf.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pd">${p[2]}</td></tr>`);
  h += `</tbody></table></div>`;
  if (d.cbi) {
    h += `<div class="p-wrap" style="margin-top:10px"><table class="p-table"><thead><tr><th>字段</th><th>类型</th><th style="width:50px">必填</th><th>说明</th></tr></thead><tbody>`;
    d.cbi.forEach(p => h += `<tr><td class="pn">${p[0]}</td><td class="pt">${p[1]}</td><td class="pr ${p[2]==="必填"?'y':'n'}">${p[2]}</td><td class="pd">${p[3]}</td></tr>`);
    h += `</tbody></table></div>`;
  }
  if (d.ce) {
    d.ce.forEach(ex => {
      h += `<div class="api-stitle" style="margin-top:10px">${ex.lb}</div>`;
      h += codeBlock(ex.cd);
    });
  } else if (d.cb) {
    h += `<div class="api-stitle" style="margin-top:10px">响应示例</div>`;
    h += codeBlock(d.cb);
  }

  h += `</div></div></div>`;
  return h;
}

function codeBlock(code) {
  const esc = code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="cb">
    <div class="cb-h">
      <div class="cbl"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></div>
      <button class="cpy" onclick="cpy(this)" data-cd="${encodeURIComponent(code)}">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
        复制
      </button>
    </div>
    <pre><code class="language-json">${esc}</code></pre>
  </div>`;
}

// ===================== INTERACTIONS =====================
function toggleEP(h, fromNav) {
  const card = h.closest ? h.closest('.ep-card') : h;
  if (!card.classList.contains('open')) {
    document.querySelectorAll('.ep-card.open').forEach(c => {
      if (c !== card) c.classList.remove('open');
    });
  }
  card.classList.toggle('open');
  if (!fromNav) syncNav(card.dataset.api);
}

function navClick(el, name) {
  const card = document.getElementById(name);
  if (card) {
    document.querySelectorAll('.ep-card.open').forEach(c => {
      if (c !== card) c.classList.remove('open');
    });
    card.classList.add('open');
    setTimeout(() => { card.scrollIntoView({ behavior:'smooth', block:'start' }); }, 50);
  }
  syncNav(name);
  return false;
}

function syncNav(name) {
  document.querySelectorAll('.snav-item').forEach(n => {
    n.classList.toggle('active', n.getAttribute('href') === '#' + name);
  });
}

function cpy(btn) {
  const code = decodeURIComponent(btn.dataset.cd);
  navigator.clipboard.writeText(code).then(() => {
    btn.classList.add('done');
    btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="20 6 9 17 4 12"/></svg> 已复制';
    setTimeout(() => {
      btn.classList.remove('done');
      btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> 复制';
    }, 2000);
  });
}

// Search
function doFilter(q) {
  const s = q.toLowerCase().trim();
  document.querySelectorAll('.ep-card').forEach(c => {
    const m = !s || c.dataset.api.toLowerCase().includes(s) || c.textContent.toLowerCase().includes(s);
    c.style.display = m ? '' : 'none';
  });
  document.querySelectorAll('.snav-item').forEach(n => {
    n.style.display = (!s || n.textContent.toLowerCase().includes(s)) ? '' : 'none';
  });
  document.querySelectorAll('.api-group').forEach(gs => {
    const vis = [...gs.querySelectorAll('.ep-card')].some(e => e.style.display !== 'none');
    gs.style.display = vis ? '' : 'none';
  });
}

// IntersectionObserver for active nav
const obs = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) { syncNav(entry.target.dataset.api); }
  });
}, { rootMargin: '-80px 0px -60% 0px' });

renderAll();
document.querySelectorAll('.ep-card').forEach(c => obs.observe(c));
</script>
</body>
